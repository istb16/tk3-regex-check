<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="grad" x1="5" y1="5" x2="43" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#0a0614"/>

  <!-- Lens ambient glow -->
  <circle cx="19" cy="19" r="15" fill="#7c3aed" opacity="0.18"/>

  <!-- Lens outer ring (glow layer) -->
  <circle cx="19" cy="19" r="12" fill="none" stroke="#863bff" stroke-width="5" opacity="0.2" filter="url(#glow)"/>

  <!-- Lens ring -->
  <circle cx="19" cy="19" r="12" fill="none" stroke="url(#grad)" stroke-width="2.5"/>

  <!-- Handle glow layer -->
  <line x1="28.5" y1="28.5" x2="39" y2="39" stroke="#863bff" stroke-width="6" stroke-linecap="round" opacity="0.2"/>

  <!-- Handle -->
  <line x1="28.5" y1="28.5" x2="39" y2="39" stroke="url(#grad)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Regex .* notation inside lens -->
  <!-- . (dot) -->
  <circle cx="14.5" cy="21" r="2.2" fill="#22d3ee"/>
  <!-- * (asterisk) — 3 crossed lines through center -->
  <!-- horizontal -->
  <line x1="20" y1="19" x2="26.5" y2="19" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <!-- vertical -->
  <line x1="23.25" y1="15.75" x2="23.25" y2="22.25" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <!-- diagonal \ -->
  <line x1="20.75" y1="16.75" x2="25.75" y2="21.75" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <!-- diagonal / -->
  <line x1="25.75" y1="16.75" x2="20.75" y2="21.75" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
</svg>
